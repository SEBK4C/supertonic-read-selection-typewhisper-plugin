name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build release bundle
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: scripts/build-supertonic-plugin.sh

      - name: Prepare release notes
        run: |
          notes_file="docs/release-notes/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes_file" ]]; then
            notes_file="docs/release-notes/latest.md"
          fi

          cp "$notes_file" release-notes.md

          if [[ -f docs/screenshots/settings.png ]]; then
            {
              printf "\n\n## Settings\n\n"
              printf "![Supertonic Read Selection settings](https://raw.githubusercontent.com/%s/%s/docs/screenshots/settings.png)\n" "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME"
            } >> release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/SupertonicReadSelectionPlugin.zip \
            --title "Supertonic Read Selection ${GITHUB_REF_NAME}" \
            --notes-file release-notes.md

